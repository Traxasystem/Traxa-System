<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=public/gate.html">
    <title>Redirecting to TRAXA System...</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(79, 70, 229, 0.3);
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div>
        <div class="loader"></div>
        <h1>TRAXA System</h1>
        <p>Redirecting to portal...</p>
        <p style="font-size: 12px; opacity: 0.7;">If not redirected, <a href="public/gate.html" style="color: #4f46e5;">click here</a></p>
    </div>
    <script>
        window.location.href = 'public/gate.html';
    </script>
</body>
</html>
