<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Attendance Camera</title>
  <!-- Face API library -->
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <!-- QR Scanner Library -->
  <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0f172a;
      color: white;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    
    .camera-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    
    #cameraFeed {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    #cameraOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    
    .status-bar {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 15px;
      z-index: 10;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .stats {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      padding: 15px 25px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      gap: 30px;
      z-index: 10;
    }
    
    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .stat-label {
      color: #94a3b8;
      font-size: 14px;
    }
    
    .stat-value {
      font-size: 18px;
      font-weight: bold;
    }
    
    .stat-value.confirmed { color: #10b981; }
    .stat-value.pending { color: #f59e0b; }
    
    .log-container {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 300px;
      max-height: 400px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 15px;
      overflow-y: auto;
      z-index: 10;
    }
    
    .log-title {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 10px;
      padding-bottom: 5px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .log-entry {
      font-size: 12px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      gap: 8px;
    }
    
    .log-time {
      color: #64748b;
      font-family: monospace;
    }
    
    .log-message {
      color: #e2e8f0;
    }
    
    .log-message.success { color: #10b981; }
    .log-message.warning { color: #f59e0b; }
    .log-message.error { color: #ef4444; }
    
    .stats, .log-container, .status-bar {
      opacity: 0.3;
      transition: opacity 0.3s;
    }
    
    .stats:hover, .log-container:hover, .status-bar:hover {
      opacity: 1;
    }

    .qr-flash {
      position: absolute;
      inset: 0;
      background: rgba(16, 185, 129, 0.3);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: flash 0.5s ease-out;
    }
    
    @keyframes flash {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }
    
    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      border-left-color: #0ea5e9;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .sync-indicator {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 10;
    }

    .sync-indicator.syncing i {
      animation: spin 1s linear infinite;
    }

    .sync-indicator.success {
      background: rgba(16, 185, 129, 0.2);
      border-color: #10b981;
    }

    .sync-indicator.error {
      background: rgba(239, 68, 68, 0.2);
      border-color: #ef4444;
    }

    .session-ended-notification {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #ef4444;
      color: white;
      padding: 16px 32px;
      border-radius: 50px;
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.5);
      z-index: 2000;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from { transform: translate(-50%, -100%); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }

    .debug-panel {
      position: absolute;
      top: 80px;
      right: 20px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 12px;
      max-width: 300px;
      z-index: 100;
      display: none;
    }

    .debug-panel.visible {
      display: block;
    }

    .debug-title {
      color: #0ea5e9;
      font-weight: bold;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
    }

    .debug-item {
      margin-bottom: 5px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .debug-value {
      color: #f59e0b;
      float: right;
    }

    .debug-success {
      color: #10b981;
    }

    .debug-error {
      color: #ef4444;
    }
  </style>
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loadingOverlay">
    <div class="text-center">
      <div class="spinner mx-auto mb-6"></div>
      <p style="color: #0ea5e9; font-size: 20px; font-weight: bold;">Loading Camera...</p>
      <p style="color: #64748b; margin-top: 10px;">Initializing face recognition</p>
    </div>
  </div>

  <!-- Camera Container -->
  <div class="camera-container">
    <video id="cameraFeed" autoplay playsinline muted></video>
    <canvas id="cameraOverlay"></canvas>
    
    <div class="status-bar">
      <div class="status-dot"></div>
      <span>Live</span>
      <span style="color: #64748b;">|</span>
      <span>Face + QR</span>
    </div>

    <div id="syncIndicator" class="sync-indicator">
      <i class="fas fa-sync-alt"></i>
      <span>Syncing...</span>
    </div>

    <!-- Debug Panel -->
    <div id="debugPanel" class="debug-panel">
      <div class="debug-title">
        <span>🔍 Face Recognition Debug</span>
        <span onclick="this.parentElement.parentElement.classList.remove('visible')" style="cursor: pointer;">✕</span>
      </div>
      <div id="debugContent"></div>
    </div>
    
    <div class="stats">
      <div class="stat-item">
        <span class="stat-label">Confirmed</span>
        <span id="presentCount" class="stat-value confirmed">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Pending</span>
        <span id="pendingCount" class="stat-value pending">0</span>
      </div>
    </div>
    
    <div class="log-container">
      <div class="log-title">RECOGNITION LOG</div>
      <div id="recognitionLog">
        <div class="log-entry">
          <span class="log-time">--:--:--</span>
          <span class="log-message">Waiting for detection...</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============================================
    // CAMERA PAGE - FIXED FACE DETECTION
    // ============================================

    // Session Data
    let currentSession = null;
    let lectureData = null;
    let subjectStudents = [];
    let attendanceRecords = [];
    let pendingRecords = [];
    
    // Face Recognition
    let modelsLoaded = false;
    let videoStream = null;
    let detectionInterval = null;
    let faceMatcher = null;
    let knownDescriptors = [];
    let lastDetectionTime = {};
    let faceDetectionCount = 0;
    let lastDebugUpdate = 0;
    
    // QR Scanner
    let qrScannerInterval = null;
    let lastQRTime = 0;
    
    // Sync
    let heartbeatInterval = null;
    let syncAttendanceInterval = null;
    let sessionStatusInterval = null;
    let deviceId = 'device_' + Math.random().toString(36).substring(2, 15) + '_' + Date.now();
    let lastSyncTime = 0;
    let sessionEndedByOtherDevice = false;
    
    const API_URL = '/api';

    // ============================================
    // INITIALIZATION
    // ============================================
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const sessionId = urlParams.get('sessionId');
      const lectureId = urlParams.get('lectureId');
      const doctorId = urlParams.get('doctorId');
      const token = urlParams.get('token');
      const doctorName = urlParams.get('doctorName') || 'Unknown';
      
      if (!sessionId || !lectureId || !doctorId || !token) {
        alert('Missing required parameters');
        window.close();
        return;
      }
      
      currentSession = {
        id: sessionId,
        lectureId: parseInt(lectureId),
        doctorId: parseInt(doctorId),
        doctorName: doctorName,
        token: token,
        startTime: new Date().toISOString()
      };
      
      await Promise.all([
        loadLectureData(),
        loadAllStudents(),
        loadFaceModels()
      ]);
      
      filterSubjectStudents();
      await createSessionOnServer();
      await startCamera();
      loadSavedAttendance();
      
      // Load face descriptors from server
      await loadFaceDescriptorsFromServer();
      
      document.getElementById('loadingOverlay').style.display = 'none';
      
      // Register active session and start monitoring
      await registerActiveSession();
      
      // Auto end session after 2 hours
      setTimeout(() => {
        if (confirm('Session timeout. End session?')) {
          endSession();
        }
      }, 2 * 60 * 60 * 1000);

      // Add debug panel (press D to show)
      document.addEventListener('keydown', (e) => {
        if (e.key === 'd' || e.key === 'D') {
          document.getElementById('debugPanel').classList.toggle('visible');
          updateDebugInfo();
        }
      });
    });

    // ============================================
    // DEBUG FUNCTIONS
    // ============================================
    function updateDebugInfo() {
      const debugContent = document.getElementById('debugContent');
      if (!debugContent) return;
      
      const now = Date.now();
      if (now - lastDebugUpdate < 500) return;
      lastDebugUpdate = now;
      
      // Create a map of student IDs for quick lookup
      const studentMap = {};
      subjectStudents.forEach(s => {
        studentMap[s.id] = s;
      });
      
      const html = `
        <div class="debug-item">
          <span>📷 Face Detections:</span>
          <span class="debug-value">${faceDetectionCount}</span>
        </div>
        <div class="debug-item">
          <span>👥 Subject Students:</span>
          <span class="debug-value">${subjectStudents.length}</span>
        </div>
        <div class="debug-item">
          <span>📊 Attendance Records:</span>
          <span class="debug-value">${attendanceRecords.length}</span>
        </div>
        <div class="debug-item">
          <span>🧠 Face Matcher Ready:</span>
          <span class="debug-value ${faceMatcher ? 'debug-success' : 'debug-error'}">${faceMatcher ? 'Yes' : 'No'}</span>
        </div>
        <div class="debug-item">
          <span>⏳ Pending Count:</span>
          <span class="debug-value">${pendingRecords.length}</span>
        </div>
        <div class="debug-item">
          <span>✅ Confirmed Count:</span>
          <span class="debug-value">${attendanceRecords.filter(r => r.confirmed).length}</span>
        </div>
        <div class="debug-item">
          <span>🔄 Last Detection Times:</span>
          <span class="debug-value">${Object.keys(lastDetectionTime).length}</span>
        </div>
      `;
      
      debugContent.innerHTML = html;
      setTimeout(updateDebugInfo, 1000);
    }

    // ============================================
    // LOAD DATA
    // ============================================
    async function loadLectureData() {
      try {
        const response = await fetch(`/database/lectures.json`);
        const lectures = await response.json();
        lectureData = lectures.find(l => l.id === currentSession.lectureId);
        if (!lectureData) throw new Error('Lecture not found');
        console.log('✅ Lecture data loaded:', lectureData);
      } catch (error) {
        console.error('Error loading lecture data:', error);
      }
    }

    async function loadAllStudents() {
      try {
        const response = await fetch(`/database/students.json`);
        window.allStudents = await response.json();
        console.log(`✅ Loaded ${window.allStudents.length} students`);
      } catch (error) {
        console.error('Error loading students:', error);
        window.allStudents = [];
      }
    }

    async function loadFaceModels() {
      try {
        console.log('📥 Loading face models...');
        await faceapi.nets.tinyFaceDetector.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights');
        await faceapi.nets.faceLandmark68Net.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights');
        await faceapi.nets.faceRecognitionNet.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights');
        
        modelsLoaded = true;
        console.log('✅ Face models loaded');
        await loadKnownFaces();
      } catch (error) {
        console.error('Error loading face models:', error);
      }
    }

    async function loadKnownFaces() {
      const subjectStudents = window.allStudents.filter(s => 
        s.level === lectureData.level && s.department === lectureData.department
      );
      
      knownDescriptors = [];
      let loadedCount = 0;
      
      for (const student of subjectStudents) {
        if (student.face_data && student.face_data.has_face && student.face_data.descriptors) {
          student.face_data.descriptors.forEach(descriptor => {
            knownDescriptors.push({
              label: student.id.toString(),
              descriptor: new Float32Array(descriptor)
            });
            loadedCount++;
          });
        }
      }
      
      console.log(`📊 Loaded ${loadedCount} face descriptors for ${subjectStudents.length} students`);
      
      if (knownDescriptors.length > 0) {
        const descriptorMap = {};
        knownDescriptors.forEach(d => {
          if (!descriptorMap[d.label]) descriptorMap[d.label] = [];
          descriptorMap[d.label].push(d.descriptor);
        });
        
        const uniqueLabeledDescriptors = Object.keys(descriptorMap).map(label => 
          new faceapi.LabeledFaceDescriptors(label, descriptorMap[label])
        );
        
        faceMatcher = new faceapi.FaceMatcher(uniqueLabeledDescriptors, 0.5);
        console.log('✅ Face matcher created with', uniqueLabeledDescriptors.length, 'students');
      } else {
        console.warn('⚠️ No face descriptors found');
      }
    }

    // ============================================
    // LOAD FACE DESCRIPTORS FROM SERVER
    // ============================================
    async function loadFaceDescriptorsFromServer() {
      try {
        const response = await fetch(`${API_URL}/face-descriptors`, {
          headers: {
            'Authorization': `Bearer ${currentSession.token}`
          }
        });
        
        if (response.ok) {
          const descriptors = await response.json();
          console.log(`📥 Loaded ${descriptors.length} face descriptor records from server`);
          
          if (descriptors.length > 0) {
            const labeledDescriptors = [];
            let serverCount = 0;
            
            descriptors.forEach(record => {
              if (record.descriptors && record.descriptors.length > 0) {
                const student = subjectStudents.find(s => s.id === record.student_id);
                if (student) {
                  const descriptorArrays = record.descriptors.map(d => new Float32Array(d));
                  labeledDescriptors.push(
                    new faceapi.LabeledFaceDescriptors(record.student_id.toString(), descriptorArrays)
                  );
                  serverCount += record.descriptors.length;
                }
              }
            });
            
            if (labeledDescriptors.length > 0) {
              faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.5);
              console.log(`✅ Built face matcher with ${labeledDescriptors.length} students (${serverCount} descriptors) from server`);
            }
          }
        }
      } catch (error) {
        console.error('Error loading face descriptors from server:', error);
      }
    }

    function filterSubjectStudents() {
      subjectStudents = window.allStudents.filter(s => 
        s.level === lectureData.level && s.department === lectureData.department
      );
      
      console.log('📋 Subject students:', subjectStudents.map(s => ({ id: s.id, name: s.name, student_id: s.student_id })));
      
      // إنشاء سجلات الحضور
      attendanceRecords = subjectStudents.map(s => ({
        studentId: s.id,
        studentName: s.name,
        student_id: s.student_id,
        status: 'absent',
        confirmed: false,
        confirmedByQR: false,
        detectedAt: null
      }));
      
      console.log(`📋 Created attendance records for ${attendanceRecords.length} students`);
      console.log('📋 Attendance records IDs:', attendanceRecords.map(r => r.studentId));
    }

    async function createSessionOnServer() {
      const sessionData = {
        sessionId: currentSession.id,
        lectureId: currentSession.lectureId,
        doctorId: currentSession.doctorId,
        doctorName: currentSession.doctorName,
        subjectName: lectureData.subject_name,
        level: lectureData.level,
        department: lectureData.department,
        totalStudents: subjectStudents.length,
        present: 0,
        pending: 0,
        students: []
      };
      
      try {
        const response = await fetch(`${API_URL}/attendance-sessions`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${currentSession.token}`
          },
          body: JSON.stringify(sessionData)
        });
        
        if (!response.ok) {
          console.warn('Session creation failed, continuing anyway');
        }
      } catch (error) {
        console.error('Error creating session:', error);
      }
    }

    function loadSavedAttendance() {
      try {
        const saved = localStorage.getItem(`attendance_${currentSession.id}`);
        if (saved) {
          const data = JSON.parse(saved);
          if (data.records) {
            attendanceRecords = data.records;
            pendingRecords = data.pending || [];
            
            pendingRecords.forEach(p => {
              lastDetectionTime[p.studentId] = Date.now();
            });
            
            updateStats();
            addToLog('Loaded saved attendance data', 'info');
            console.log(`📂 Loaded ${pendingRecords.length} pending from localStorage`);
          }
        }
      } catch (error) {
        console.error('Error loading saved attendance:', error);
      }
    }

    // ============================================
    // ACTIVE SESSIONS SYNC
    // ============================================
    async function registerActiveSession() {
      if (!currentSession) return;
      
      const sessionData = {
        sessionId: currentSession.id,
        lectureId: currentSession.lectureId,
        doctorId: currentSession.doctorId,
        doctorName: currentSession.doctorName,
        subjectName: lectureData?.subject_name || 'Unknown',
        level: lectureData?.level || null,
        department: lectureData?.department || null,
        startTime: currentSession.startTime,
        deviceId: deviceId,
        deviceInfo: {
          deviceId: deviceId,
          userAgent: navigator.userAgent,
          platform: navigator.platform,
          screenSize: `${window.screen.width}x${window.screen.height}`
        }
      };
      
      try {
        const response = await fetch(`${API_URL}/active-sessions`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${currentSession.token}`
          },
          body: JSON.stringify(sessionData)
        });
        
        if (response.ok) {
          console.log('✅ Registered in active sessions');
          startHeartbeat();
          startSessionMonitoring();
          updateSyncIndicator('success', 'Connected');
        }
      } catch (error) {
        console.error('Error registering active session:', error);
        updateSyncIndicator('error', 'Connection error');
      }
    }

    function startHeartbeat() {
      if (heartbeatInterval) clearInterval(heartbeatInterval);
      
      heartbeatInterval = setInterval(async () => {
        if (!currentSession || sessionEndedByOtherDevice) return;
        
        try {
          await fetch(`${API_URL}/active-sessions/${currentSession.id}/heartbeat`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${currentSession.token}`
            },
            body: JSON.stringify({ deviceId })
          });
        } catch (error) {
          console.error('Heartbeat error:', error);
        }
      }, 30000);
    }

    async function endActiveSession() {
      if (!currentSession) return;
      
      if (heartbeatInterval) {
        clearInterval(heartbeatInterval);
        heartbeatInterval = null;
      }
      
      if (sessionStatusInterval) {
        clearInterval(sessionStatusInterval);
        sessionStatusInterval = null;
      }
      
      try {
        await fetch(`${API_URL}/active-sessions/${currentSession.id}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${currentSession.token}`
          }
        });
        console.log('✅ Removed from active sessions');
      } catch (error) {
        console.error('Error ending active session:', error);
      }
    }

    function startSessionMonitoring() {
      if (!currentSession) return;
      
      sessionStatusInterval = setInterval(async () => {
        if (sessionEndedByOtherDevice) return;
        
        try {
          const response = await fetch(`${API_URL}/active-sessions/${currentSession.id}/status`, {
            headers: {
              'Authorization': `Bearer ${currentSession.token}`
            }
          });
          
          if (response.ok) {
            const data = await response.json();
            
            if (!data.active) {
              console.log('⚠️ Session ended by another device');
              sessionEndedByOtherDevice = true;
              showSessionEndedMessage();
              await handleSessionEndedByOtherDevice();
            }
          }
        } catch (error) {
          console.error('Error checking session status:', error);
        }
      }, 2000);
    }

    function showSessionEndedMessage() {
      const notification = document.createElement('div');
      notification.className = 'session-ended-notification';
      notification.innerHTML = `
        <i class="fas fa-exclamation-circle" style="font-size: 20px;"></i>
        <span style="font-weight: bold;">Session ended by another device</span>
        <button onclick="this.parentElement.remove(); forceCloseCamera()" 
                style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 25px; margin-left: 10px; cursor: pointer;">
          Close
        </button>
      `;
      
      document.body.appendChild(notification);
      
      setTimeout(() => {
        if (notification.parentElement) {
          notification.remove();
          forceCloseCamera();
        }
      }, 10000);
    }

    function forceCloseCamera() {
      stopCamera();
      
      const container = document.querySelector('.camera-container');
      if (container) {
        container.innerHTML = `
          <div style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #0f172a; text-align: center;">
            <div>
              <div style="width: 80px; height: 80px; background: #ef4444; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-stop-circle" style="font-size: 40px; color: white;"></i>
              </div>
              <h2 style="color: white; font-size: 24px; margin-bottom: 10px;">Session Ended</h2>
              <p style="color: #94a3b8; margin-bottom: 20px;">This session was ended by another device</p>
              <button onclick="window.close()" style="background: #ef4444; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer;">
                Close Window
              </button>
            </div>
          </div>
        `;
      }

    async function handleSessionEndedByOtherDevice() {
      if (syncAttendanceInterval) {
        clearInterval(syncAttendanceInterval);
        syncAttendanceInterval = null;
      }
      
      if (detectionInterval) {
        clearInterval(detectionInterval);
        detectionInterval = null;
      }
      
      if (qrScannerInterval) {
        clearInterval(qrScannerInterval);
        qrScannerInterval = null;
      }
    }

    function updateSyncIndicator(status, message) {
      const indicator = document.getElementById('syncIndicator');
      if (!indicator) return;
      
      indicator.className = `sync-indicator ${status}`;
      
      if (status === 'success') {
        indicator.innerHTML = `<i class="fas fa-check-circle"></i> <span>${message}</span>`;
      } else if (status === 'error') {
        indicator.innerHTML = `<i class="fas fa-exclamation-circle"></i> <span>${message}</span>`;
      } else {
        indicator.innerHTML = `<i class="fas fa-sync-alt fa-spin"></i> <span>${message}</span>`;
      }
      
      setTimeout(() => {
        indicator.innerHTML = `<i class="fas fa-sync-alt"></i> <span>Synced</span>`;
        indicator.className = 'sync-indicator';
      }, 3000);
    }

    // ============================================
    // SYNC ATTENDANCE DATA WITH SERVER
    // ============================================
    async function syncAttendanceWithServer() {
      if (!currentSession || sessionEndedByOtherDevice) return;
      
      try {
        const sessionData = {
          records: attendanceRecords,
          pending: pendingRecords,
          lastUpdate: new Date().toISOString()
        };
        
        const response = await fetch(`${API_URL}/attendance-session-data/${currentSession.id}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${currentSession.token}`
          },
          body: JSON.stringify(sessionData)
        });
        
        if (response.ok) {
          lastSyncTime = Date.now();
        }
      } catch (error) {
        console.error('Error syncing attendance data:', error);
      }
    }

    async function loadAttendanceFromServer() {
      if (!currentSession) return;
      
      try {
        const response = await fetch(`${API_URL}/attendance-session-data/${currentSession.id}`, {
          headers: {
            'Authorization': `Bearer ${currentSession.token}`
          }
        });
        
        if (response.ok) {
          const data = await response.json();
          
          if (data.records && data.records.length > 0) {
            console.log(`📥 Loaded attendance data from server: ${data.pending?.length || 0} pending`);
            mergeAttendanceData(data);
          }
        }
      } catch (error) {
        console.error('Error loading attendance from server:', error);
      }
    }

    function mergeAttendanceData(serverData) {
      if (!serverData.records) return;
      
      let changed = false;
      
      const localRecordsMap = new Map();
      attendanceRecords.forEach(r => localRecordsMap.set(r.studentId, r));
      
      serverData.records.forEach(serverRecord => {
        const localRecord = localRecordsMap.get(serverRecord.studentId);
        
        if (localRecord) {
          if (!localRecord.confirmed && serverRecord.confirmed) {
            Object.assign(localRecord, serverRecord);
            changed = true;
            console.log(`🔄 Updated ${serverRecord.studentName} to confirmed from server`);
          }
        }
      });
      
      if (serverData.pending && serverData.pending.length > 0) {
        const localPendingIds = new Set(pendingRecords.map(p => p.studentId));
        
        serverData.pending.forEach(serverPending => {
          if (!localPendingIds.has(serverPending.studentId)) {
            pendingRecords.push(serverPending);
            lastDetectionTime[serverPending.studentId] = Date.now();
            changed = true;
            console.log(`➕ Added pending from server: ${serverPending.studentName}`);
          }
        });
      }
      
      if (changed) {
        updateStats();
        addToLog('🔄 Attendance data synced from server', 'info');
        saveLocalAttendance();
      }
    }

    function startAttendanceSync() {
      if (syncAttendanceInterval) clearInterval(syncAttendanceInterval);
      
      setTimeout(() => {
        loadAttendanceFromServer();
      }, 2000);
      
      syncAttendanceInterval = setInterval(async () => {
        await loadAttendanceFromServer();
        await syncAttendanceWithServer();
      }, 5000);
    }

    // ============================================
    // CAMERA
    // ============================================
    async function startCamera() {
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({
          video: { 
            width: { ideal: 1280 },
            height: { ideal: 720 },
            facingMode: 'environment'
          }
        });
        
        const video = document.getElementById('cameraFeed');
        video.srcObject = videoStream;
        
        video.onloadedmetadata = () => {
          video.play();
          startFaceDetection();
          startQRScanning();
          
          loadAttendanceFromServer();
          startAttendanceSync();
        };
        
      } catch (error) {
        console.error('Camera error:', error);
        alert('Could not access camera. Please check permissions.');
      }
    }

    function stopCamera() {
      if (detectionInterval) clearInterval(detectionInterval);
      if (qrScannerInterval) clearInterval(qrScannerInterval);
      if (syncAttendanceInterval) clearInterval(syncAttendanceInterval);
      if (heartbeatInterval) clearInterval(heartbeatInterval);
      if (sessionStatusInterval) clearInterval(sessionStatusInterval);
      if (videoStream) videoStream.getTracks().forEach(track => track.stop());
    }

    // ============================================
    // FACE DETECTION - محسنة بالكامل
    // ============================================
    function startFaceDetection() {
      const video = document.getElementById('cameraFeed');
      const canvas = document.getElementById('cameraOverlay');
      const ctx = canvas.getContext('2d');
      
      if (detectionInterval) clearInterval(detectionInterval);
      
      detectionInterval = setInterval(async () => {
        if (!video || video.paused || video.ended || !modelsLoaded || !faceMatcher) {
          return;
        }
        
        if (video.videoWidth === 0 || video.videoHeight === 0) {
          return;
        }
        
        try {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          
          const detections = await faceapi.detectAllFaces(
            video,
            new faceapi.TinyFaceDetectorOptions({ 
              inputSize: 320,
              scoreThreshold: 0.3
            })
          )
          .withFaceLandmarks()
          .withFaceDescriptors();
          
          if (detections.length > 0) {
            faceDetectionCount++;
            console.log(`👤 Detected ${detections.length} face(s) (total: ${faceDetectionCount})`);
            
            for (const detection of detections) {
              await processFaceDetection(detection, ctx);
            }
          }
          
        } catch (error) {
          console.debug('Face detection error:', error.message);
        }
      }, 200);
    }

    async function processFaceDetection(detection, ctx) {
      const box = detection.detection.box;
      const descriptor = detection.descriptor;
      
      // رسم المربع
      ctx.strokeStyle = '#f59e0b';
      ctx.lineWidth = 3;
      ctx.strokeRect(box.x, box.y, box.width, box.height);
      
      if (!faceMatcher) {
        ctx.fillStyle = '#ef4444';
        ctx.font = 'bold 14px Inter';
        ctx.fillText('Matcher not ready', box.x, box.y - 10);
        return;
      }
      
      // البحث عن أفضل تطابق
      const bestMatch = faceMatcher.findBestMatch(descriptor);
      const distance = bestMatch.distance;
      const isMatch = distance < 0.5; // threshold 0.5
      
      console.log(`🔍 Face match: ${bestMatch.label}, distance: ${distance.toFixed(3)}, isMatch: ${isMatch}`);
      
      if (!isMatch) {
        ctx.fillStyle = '#ef4444';
        ctx.font = 'bold 14px Inter';
        ctx.fillText(`Unknown (${distance.toFixed(2)})`, box.x, box.y - 10);
        return;
      }
      
      const studentId = parseInt(bestMatch.label);
      console.log(`🔍 Looking for student with ID: ${studentId}`);
      
      // البحث في attendanceRecords أولاً (أسرع)
      let record = attendanceRecords.find(r => r.studentId === studentId);
      let matchedStudent = null;
      
      if (record) {
        matchedStudent = {
          id: record.studentId,
          name: record.studentName,
          student_id: record.student_id
        };
        console.log(`✅ Found student in attendanceRecords: ${matchedStudent.name}`);
      } else {
        // إذا لم يوجد في attendanceRecords، ابحث في subjectStudents
        matchedStudent = subjectStudents.find(s => s.id === studentId);
        
        if (matchedStudent) {
          console.log(`✅ Found student in subjectStudents but NOT in attendanceRecords! Adding...`);
          
          // إضافة الطالب إلى attendanceRecords
          record = {
            studentId: matchedStudent.id,
            studentName: matchedStudent.name,
            student_id: matchedStudent.student_id,
            status: 'absent',
            confirmed: false,
            confirmedByQR: false,
            detectedAt: null
          };
          attendanceRecords.push(record);
          console.log(`➕ Added missing student to attendanceRecords: ${matchedStudent.name}`);
        }
      }
      
      if (!matchedStudent) {
        console.log(`❌ Student not found for ID: ${studentId}`);
        ctx.fillStyle = '#ef4444';
        ctx.font = 'bold 14px Inter';
        ctx.fillText('Student not found', box.x, box.y - 10);
        return;
      }
      
      // رسم اسم الطالب
      ctx.fillStyle = '#f59e0b';
      ctx.font = 'bold 16px Inter';
      ctx.fillText(matchedStudent.name, box.x, box.y - 10);
      
      // رسم نسبة المطابقة
      ctx.fillStyle = '#94a3b8';
      ctx.font = 'bold 12px Inter';
      ctx.fillText(`Match: ${((1 - distance) * 100).toFixed(0)}%`, box.x, box.y - 30);
      
      // إذا كان الطالب مؤكد بالفعل
      if (record && record.confirmed) {
        ctx.fillStyle = '#10b981';
        ctx.font = 'bold 14px Inter';
        ctx.fillText('✓ CONFIRMED', box.x, box.y - 50);
        return;
      }
      
      // التحقق من timeout
      const now = Date.now();
      const lastDetected = lastDetectionTime[studentId] || 0;
      
      if (now - lastDetected < 10000) { // 10 ثواني timeout
        ctx.fillStyle = '#94a3b8';
        ctx.font = 'bold 14px Inter';
        ctx.fillText('⏳ Recently detected', box.x, box.y - 50);
        return;
      }
      
      // تحديث وقت آخر كشف
      lastDetectionTime[studentId] = now;
      
      // تحديث حالة الطالب إلى pending
      if (record) {
        record.status = 'pending';
        record.detectedAt = new Date().toLocaleTimeString();
      }
      
      // التحقق مما إذا كان الطالب موجود بالفعل في pending
      const existingPendingIndex = pendingRecords.findIndex(p => p.studentId === studentId);
      
      if (existingPendingIndex === -1) {
        // إضافة إلى pending
        pendingRecords.push({
          studentId: studentId,
          studentName: matchedStudent.name,
          student_id: matchedStudent.student_id,
          detectedAt: new Date().toLocaleTimeString(),
          type: 'face',
          confidence: 1 - distance,
          distance: distance
        });
        
        console.log(`✅ ADDED PENDING: ${matchedStudent.name} (confidence: ${(1 - distance).toFixed(2)})`);
        
        // رسم علامة pending
        ctx.fillStyle = '#f59e0b';
        ctx.font = 'bold 16px Inter';
        ctx.fillText('⏳ PENDING', box.x, box.y - 70);
        
        // تحديث الواجهة
        addToLog(`📸 Face detected: ${matchedStudent.name} (${(1 - distance).toFixed(0)}%)`, 'warning');
        updateStats();
        
        // حفظ فوري
        saveLocalAttendance();
        
        // مزامنة مع السيرفر
        await syncAttendanceWithServer();
      } else {
        console.log(`⏳ ${matchedStudent.name} already pending (index: ${existingPendingIndex})`);
        ctx.fillStyle = '#f59e0b';
        ctx.font = 'bold 14px Inter';
        ctx.fillText('⏳ Already pending', box.x, box.y - 50);
      }
    }

    // ============================================
    // QR SCANNER
    // ============================================
    function startQRScanning() {
      qrScannerInterval = setInterval(() => {
        const video = document.getElementById('cameraFeed');
        if (!video || video.videoWidth === 0) return;
        
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        if (window.jsQR) {
          const code = window.jsQR(imageData.data, canvas.width, canvas.height, {
            inversionAttempts: "dontInvert"
          });
          
          if (code && Date.now() - lastQRTime > 3000) {
            lastQRTime = Date.now();
            processQRCode(code.data);
          }
        }
      }, 300);
    }

    function processQRCode(qrData) {
      try {
        let studentData;
        try {
          studentData = JSON.parse(qrData);
        } catch (e) {
          studentData = { student_id: qrData };
        }
        
        const studentId = studentData.student_id || studentData.id || qrData;
        const student = subjectStudents.find(s => s.student_id === studentId || s.id == studentId);
        
        if (!student) {
          addToLog(`QR: Unknown student ID ${studentId}`, 'error');
          return;
        }
        
        const record = attendanceRecords.find(r => r.studentId === student.id);
        if (!record) return;
        
        // التحقق من أن الطالب في حالة pending
        if (record.status !== 'pending' || record.confirmed) {
          addToLog(`QR ignored: ${student.name} (not in pending)`, 'warning');
          return;
        }
        
        // Flash effect
        const flash = document.createElement('div');
        flash.className = 'qr-flash';
        document.querySelector('.camera-container').appendChild(flash);
        setTimeout(() => flash.remove(), 500);
        
        // Confirm student
        record.confirmed = true;
        record.confirmedByQR = true;
        record.status = 'confirmed';
        record.confirmedAt = new Date().toLocaleTimeString();
        
        // إزالة من pending
        pendingRecords = pendingRecords.filter(p => p.studentId !== student.id);
        
        addToLog(`✅ QR: ${student.name} confirmed`, 'success');
        updateStats();
        
        // حفظ فوري
        saveLocalAttendance();
        syncAttendanceWithServer();
        
      } catch (error) {
        console.error('QR processing error:', error);
      }
    }

    // ============================================
    // SAVE TO SERVER
    // ============================================
    function saveLocalAttendance() {
      try {
        const localData = {
          sessionId: currentSession.id,
          lectureId: currentSession.lectureId,
          subjectName: lectureData.subject_name,
          records: attendanceRecords,
          pending: pendingRecords,
          lastUpdate: new Date().toISOString()
        };
        
        localStorage.setItem(`attendance_${currentSession.id}`, JSON.stringify(localData));
        console.log('💾 Saved locally:', pendingRecords.length, 'pending');
        
        syncAttendanceWithServer();
        
      } catch (error) {
        console.error('Error saving locally:', error);
      }
    }

    async function saveToServer() {
      const present = attendanceRecords.filter(r => r.confirmed).length;
      const pending = pendingRecords.length;
      
      const sessionData = {
        present: present,
        pending: pending,
        students: [
          ...pendingRecords.map(p => ({
            studentId: p.studentId,
            name: p.studentName,
            student_id: p.student_id,
            status: 'pending',
            detectedAt: p.detectedAt,
            detectionType: 'face',
            confidence: p.confidence
          })),
          ...attendanceRecords.filter(r => r.confirmed).map(r => ({
            studentId: r.studentId,
            name: r.studentName,
            student_id: r.student_id,
            status: 'confirmed',
            confirmedAt: r.confirmedAt,
            confirmedBy: r.confirmedByQR ? 'qr' : 'face'
          }))
        ]
      };
      
      try {
        const response = await fetch(`${API_URL}/attendance-sessions/${currentSession.id}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${currentSession.token}`
          },
          body: JSON.stringify(sessionData)
        });
        
        if (!response.ok) {
          console.warn('Failed to update server, saving locally');
        }
        
        saveLocalAttendance();
        
      } catch (error) {
        console.error('Error saving to server:', error);
        saveLocalAttendance();
      }
    }

    function saveReportLocally(report) {
      try {
        const localReports = JSON.parse(localStorage.getItem(`attendance_reports_${currentSession.doctorId}`) || '[]');
        localReports.push(report);
        localStorage.setItem(`attendance_reports_${currentSession.doctorId}`, JSON.stringify(localReports));
        console.log('💾 Report saved locally as backup');
      } catch (error) {
        console.error('Error saving report locally:', error);
      }
    }

// ============================================
// END SESSION - مع حفظ جميع الطلاب في التقرير
// ============================================
async function endSession() {
  const present = attendanceRecords.filter(r => r.confirmed).length;
  const pending = pendingRecords.length;
  
  try {
    // التأكد من أن attendanceRecords يحتوي على جميع الطلاب
    // إذا كان هناك طلاب في subjectStudents غير موجودين في attendanceRecords، نضيفهم
    const allStudentIds = new Set(subjectStudents.map(s => s.id));
    const existingStudentIds = new Set(attendanceRecords.map(r => r.studentId));
    
    // إضافة الطلاب المفقودين
    subjectStudents.forEach(student => {
      if (!existingStudentIds.has(student.id)) {
        attendanceRecords.push({
          studentId: student.id,
          studentName: student.name,
          student_id: student.student_id,
          status: 'absent',
          confirmed: false,
          confirmedByQR: false,
          detectedAt: null
        });
        console.log(`➕ Added missing student to final report: ${student.name}`);
      }
    });
    
    // ترتيب الطلاب حسب رقم الطالب
    const sortedStudents = [...attendanceRecords].sort((a, b) => {
      const numA = parseInt(a.student_id?.replace(/[^0-9]/g, '')) || 0;
      const numB = parseInt(b.student_id?.replace(/[^0-9]/g, '')) || 0;
      return numA - numB;
    });
    
    const finalReport = {
      sessionId: currentSession.id,
      lectureId: currentSession.lectureId,
      subjectName: lectureData.subject_name,
      subjectCode: lectureData.subject_code || 'N/A',
      doctorId: currentSession.doctorId,
      doctorName: currentSession.doctorName,
      level: lectureData.level,
      department: lectureData.department,
      date: new Date().toISOString().split('T')[0],
      startTime: currentSession.startTime,
      endTime: new Date().toISOString(),
      totalStudents: subjectStudents.length, // العدد الفعلي للطلاب في المادة
      present: present,
      pending: pending,
      absent: subjectStudents.length - present - pending, // عدد الغائبين
      students: sortedStudents.map(r => {
        // البحث عن الطالب في subjectStudents للحصول على معلومات إضافية
        const studentInfo = subjectStudents.find(s => s.id === r.studentId) || {};
        
        return {
          studentId: r.studentId,
          studentName: r.studentName || studentInfo.name || 'Unknown',
          student_id: r.student_id || studentInfo.student_id || 'N/A',
          status: r.confirmed ? 'confirmed' : (pendingRecords.some(p => p.studentId === r.studentId) ? 'pending' : 'absent'),
          confirmedBy: r.confirmedByQR ? 'QR Code' : (r.confirmed ? 'Face Recognition' : null),
          confirmedAt: r.confirmedAt || null,
          detectedAt: r.detectedAt || null,
          // معلومات إضافية
          level: studentInfo.level || lectureData.level,
          department: studentInfo.department || lectureData.department
        };
      })
    };
    
    console.log('📝 Final report prepared:', {
      totalStudents: finalReport.totalStudents,
      present: finalReport.present,
      pending: finalReport.pending,
      absent: finalReport.absent,
      studentsCount: finalReport.students.length
    });
    
    // حفظ التقرير في السيرفر
    try {
      const response = await fetch(`${API_URL}/attendance-reports`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${currentSession.token}`
        },
        body: JSON.stringify(finalReport)
      });
      
      if (response.ok) {
        const result = await response.json();
        console.log('✅ Report saved to server:', result);
        addToLog(`✅ Report saved with ${finalReport.present} present, ${finalReport.absent} absent`, 'success');
      } else {
        console.error('Failed to save report to server');
        saveReportLocally(finalReport);
      }
    } catch (error) {
      console.error('Error saving report to server:', error);
      saveReportLocally(finalReport);
    }
    
    // إنهاء الجلسة النشطة
    await endActiveSession();
    
    // حذف بيانات الجلسة من السيرفر
    try {
      await fetch(`${API_URL}/attendance-session-data/${currentSession.id}`, {
        method: 'DELETE',
        headers: {
          'Authorization': `Bearer ${currentSession.token}`
        }
      });
    } catch (error) {
      console.error('Error deleting session data:', error);
    }
    
    // إظهار رسالة قبل الإغلاق
    addToLog(`✅ Session ended. Report saved.`, 'success');
    
    setTimeout(() => {
      window.close();
    }, 2000);
    
  } catch (error) {
    console.error('Error ending session:', error);
    
    // حفظ محلياً كنسخة احتياطية
    const fallbackReport = {
      sessionId: currentSession.id,
      lectureId: currentSession.lectureId,
      subjectName: lectureData.subject_name,
      doctorId: currentSession.doctorId,
      doctorName: currentSession.doctorName,
      date: new Date().toISOString().split('T')[0],
      totalStudents: subjectStudents.length,
      present: attendanceRecords.filter(r => r.confirmed).length,
      pending: pendingRecords.length,
      absent: subjectStudents.length - attendanceRecords.filter(r => r.confirmed).length - pendingRecords.length,
      fallback: true,
      students: subjectStudents.map(s => {
        const record = attendanceRecords.find(r => r.studentId === s.id) || {};
        const isPending = pendingRecords.some(p => p.studentId === s.id);
        
        return {
          studentId: s.id,
          studentName: s.name,
          student_id: s.student_id,
          status: record.confirmed ? 'confirmed' : (isPending ? 'pending' : 'absent'),
          confirmedBy: record.confirmedByQR ? 'QR Code' : (record.confirmed ? 'Face Recognition' : null),
          confirmedAt: record.confirmedAt || null
        };
      })
    };
    
    saveReportLocally(fallbackReport);
    
    setTimeout(() => {
      window.close();
    }, 2000);
  }
}

    // ============================================
    // UI UPDATES
    // ============================================
    function updateStats() {
      document.getElementById('presentCount').textContent = attendanceRecords.filter(r => r.confirmed).length;
      document.getElementById('pendingCount').textContent = pendingRecords.length;
    }

    function addToLog(message, type = 'info') {
      const log = document.getElementById('recognitionLog');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      
      const time = new Date().toLocaleTimeString();
      entry.innerHTML = `
        <span class="log-time">${time}</span>
        <span class="log-message ${type}">${message}</span>
      `;
      
      log.prepend(entry);
      
      while (log.children.length > 20) {
        log.removeChild(log.lastChild);
      }
    }

    function showServerCameraMode() {
      document.getElementById('loadingOverlay').style.display = 'none';
      
      const container = document.querySelector('.camera-container');
      container.innerHTML = `
        <div style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #0f172a; text-align: center; padding: 20px;">
          <div style="max-width: 500px;">
            <div style="width: 100px; height: 100px; background: #0ea5e9; border-radius: 50%; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center;">
              <i class="fas fa-camera" style="font-size: 50px; color: white;"></i>
            </div>
            <h1 style="color: white; font-size: 28px; margin-bottom: 15px;">Camera is Running on Server</h1>
            <p style="color: #94a3b8; font-size: 16px; line-height: 1.6; margin-bottom: 30px;">
              The camera is active on the host machine.<br>
              Students can scan QR codes or use face recognition on the host.
            </p>
            <div style="background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 30px;">
              <p style="color: #e2e8f0; margin-bottom: 10px;">📊 Session Statistics:</p>
              <div style="display: flex; justify-content: space-around;">
                <div>
                  <span id="statPresent" style="font-size: 32px; font-weight: bold; color: #10b981;">0</span>
                  <p style="color: #64748b; font-size: 14px;">Confirmed</p>
                </div>
                <div>
                  <span id="statPending" style="font-size: 32px; font-weight: bold; color: #f59e0b;">0</span>
                  <p style="color: #64748b; font-size: 14px;">Pending</p>
                </div>
              </div>
            </div>
            <button onclick="window.close()" style="background: #ef4444; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-size: 16px; cursor: pointer;">
              Close Session
            </button>
          </div>
        </div>
      `;
      
      startPollingForUpdates();
    }

    function startPollingForUpdates() {
      setInterval(async () => {
        try {
          const response = await fetch(`${API_URL}/attendance-sessions/${currentSession.id}`, {
            headers: {
              'Authorization': `Bearer ${currentSession.token}`
            }
          });
          
          if (response.ok) {
            const data = await response.json();
            document.getElementById('statPresent').textContent = data.present || 0;
            document.getElementById('statPending').textContent = data.pending || 0;
          }
        } catch (error) {
          console.error('Error polling session:', error);
        }
      }, 2000);
    }

    // ============================================
    // CLEANUP
    // ============================================
window.addEventListener('beforeunload', () => {
  if (currentSession && !sessionEndedByOtherDevice) {
    navigator.sendBeacon(`${API_URL}/active-sessions/${currentSession.id}/unlisten`, 
      new Blob([JSON.stringify({ deviceId })], { type: 'application/json' }));
    
    navigator.sendBeacon(`${API_URL}/attendance-session-data/${currentSession.id}`, 
      new Blob([JSON.stringify({
        records: attendanceRecords,
        pending: pendingRecords,
        lastUpdate: new Date().toISOString()
      })], { type: 'application/json' }));
  }
  
  if (currentSession) {
    navigator.sendBeacon(`${API_URL}/attendance-sessions/${currentSession.id}`, '');
  }
});


    window.addEventListener('message', (event) => {
      if (event.data === 'close-camera') {
        stopCamera();
        window.close();
      }
    });
  </script>
</body>
