services:
  - type: web
    name: traxa-system
    runtime: node
    repo: https://github.com/Traxasystem/Traxa-System
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: PORT
        value: 10000
    plan: free
    healthCheckPath: /health